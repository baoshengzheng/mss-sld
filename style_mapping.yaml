# ============================================================
# ZOOM 17 SCALE PARAMETERS for SLD
# ============================================================
# OGC SLD 1.0 uses ScaleDenominator
# At 90 DPI (0.28mm pixel), z17 ground resolution ≈ 1.19 m/pixel
# ScaleDenominator = 1.19 / 0.00028 ≈ 4250 for Mercator at equator
# For WGS84 lat/lon data, use ~2400 as min scale for z17 visibility
z17_sld_parameters:
  min_scale_denominator: 1000
  max_scale_denominator: 2500
  note: |
    These values control z17 visibility in SLD.
    Features should appear when map scale is between ~1:1000 and ~1:2500.
    Adjust based on actual WMS DPI and coordinate system.
    For Geofabrik data in EPSG:4326, actual scale conversion differs by latitude.

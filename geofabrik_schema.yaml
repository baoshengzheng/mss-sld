    fclass_values:
      - { code: 4101, fclass: "spring",        osm_tags: "natural=spring" }
      - { code: 4103, fclass: "glacier",       osm_tags: "natural=glacier" }
      - { code: 4111, fclass: "peak",          osm_tags: "natural=peak" }
      - { code: 4112, fclass: "cliff",         osm_tags: "natural=cliff" }
      - { code: 4113, fclass: "volcano",       osm_tags: "natural=volcano" }
      - { code: 4121, fclass: "tree",          osm_tags: "natural=tree" }
      - { code: 4131, fclass: "mine",          osm_tags: "natural=mine" }
      - { code: 4132, fclass: "cave_entrance", osm_tags: "natural=cave_entrance" }
      - { code: 4141, fclass: "beach",         osm_tags: "natural=beach" }

  - name: traffic
    geometry: point  # also exists as area (_a suffix)
    code_prefix: "52xx"
    description: "Traffic-related features — signals, parking, fuel, water traffic"
    additional_fields: []
    fclass_values:
      - { code: 5201, fclass: "traffic_signals",    group: "traffic",   osm_tags: "highway=traffic_signals" }
      - { code: 5202, fclass: "mini_roundabout",    group: "traffic",   osm_tags: "highway=mini_roundabout" }
      - { code: 5203, fclass: "stop",               group: "traffic",   osm_tags: "highway=stop" }
      - { code: 5204, fclass: "crossing",           group: "traffic",   osm_tags: "highway=crossing OR railway=level_crossing" }
      - { code: 5205, fclass: "ford",               group: "traffic",   osm_tags: "highway=ford" }
      - { code: 5206, fclass: "motorway_junction",  group: "traffic",   osm_tags: "highway=motorway_junction" }
      - { code: 5207, fclass: "turning_circle",     group: "traffic",   osm_tags: "highway=turning_circle" }
      - { code: 5208, fclass: "speed_camera",       group: "traffic",   osm_tags: "highway=speed_camera" }
      - { code: 5209, fclass: "street_lamp",        group: "traffic",   osm_tags: "highway=street_lamp" }
      - { code: 5250, fclass: "fuel",               group: "fuel",      osm_tags: "amenity=fuel" }
      - { code: 5251, fclass: "service",            group: "fuel",      osm_tags: "highway=services" }
      - { code: 5260, fclass: "parking",            group: "parking",   osm_tags: "amenity=parking (general, public)" }
      - { code: 5261, fclass: "parking_surface",    group: "parking",   osm_tags: "amenity=parking + parking=surface (public)" }
      - { code: 5262, fclass: "parking_multistorey", group: "parking",  osm_tags: "amenity=parking + parking=multi-storey (public)" }
      - { code: 5263, fclass: "parking_underground", group: "parking",  osm_tags: "amenity=parking + parking=underground (public)" }
      - { code: 5264, fclass: "parking_street",     group: "parking",   osm_tags: "amenity=parking + parking=street_side/lane (public)" }
      - { code: 5270, fclass: "parking_bicycle",    group: "parking",   osm_tags: "amenity=bicycle_parking (public)" }
      - { code: 5271, fclass: "bicycle_repair_station", group: "parking", osm_tags: "amenity=bicycle_repair_station" }
      # water traffic
      - { code: 5301, fclass: "slipway",            group: "water",     osm_tags: "leisure=slipway" }
      - { code: 5302, fclass: "marina",             group: "water",     osm_tags: "leisure=marina" }
      - { code: 5303, fclass: "pier",               group: "water",     osm_tags: "man_made=pier" }
      - { code: 5311, fclass: "dam",                group: "water",     osm_tags: "waterway=dam" }
      - { code: 5321, fclass: "waterfall",          group: "water",     osm_tags: "waterway=waterfall" }
      - { code: 5331, fclass: "lock_gate",          group: "water",     osm_tags: "waterway=lock_gate" }
      - { code: 5332, fclass: "weir",               group: "water",     osm_tags: "waterway=weir" }

  - name: transport
    geometry: point  # also exists as area (_a suffix)
    code_prefix: "56xx"
    description: "Transport infrastructure — stations, stops, airports, ferry terminals"
    additional_fields: []
    fclass_values:
      - { code: 5601, fclass: "railway_station",    osm_tags: "railway=station" }
      - { code: 5602, fclass: "railway_halt",       osm_tags: "railway=halt OR public_transport=stop_position + train=yes" }
      - { code: 5603, fclass: "tram_stop",          osm_tags: "railway=tram_stop OR public_transport=stop_position + tram=yes" }
      - { code: 5621, fclass: "bus_stop",           osm_tags: "highway=bus_stop OR public_transport=stop_position + bus=yes" }
      - { code: 5622, fclass: "bus_station",        osm_tags: "amenity=bus_station" }
      - { code: 5641, fclass: "taxi_rank",          osm_tags: "amenity=taxi" }
      - { code: 5651, fclass: "airport",            osm_tags: "amenity=airport OR aeroway=aerodrome (except type=airstrip)" }
      - { code: 5652, fclass: "airfield",           osm_tags: "aeroway=airfield OR military=airfield OR aeroway=aeroway + type=airstrip" }
      - { code: 5655, fclass: "helipad",            osm_tags: "aeroway=helipad" }
      - { code: 5656, fclass: "apron",              osm_tags: "aeroway=apron" }
      - { code: 5661, fclass: "ferry_terminal",     osm_tags: "amenity=ferry_terminal" }
      - { code: 5671, fclass: "aerialway_station",  osm_tags: "aerialway=station" }

  # ============================================================
  # LINE FEATURES
  # ============================================================

  - name: roads
    geometry: linestring
    code_prefix: "51xx"
    description: "All kinds of roads from motorways to tracks, cycleways, and footpaths"
    additional_fields:
      - { name: "ref",     type: "VARCHAR(20)",  osm_tags: "ref=*",              description: "Reference number (e.g. 'A 5', 'L 605')" }
      - { name: "oneway",  type: "VARCHAR(1)",   osm_tags: "oneway=*",           description: "'F'=forward, 'T'=backward, 'B'=both" }
      - { name: "maxspeed", type: "SMALLINT",     osm_tags: "maxspeed=*",         description: "Max allowed speed in km/h" }
      - { name: "layer",   type: "SMALLINT",      osm_tags: "layer=*",            description: "Relative layering (-5 to 5)" }
      - { name: "bridge",  type: "VARCHAR(1)",   osm_tags: "bridge=*",           description: "'T' = on bridge, 'F' = not" }
      - { name: "tunnel",  type: "VARCHAR(1)",   osm_tags: "tunnel=*",           description: "'T' = in tunnel, 'F' = not" }
    fclass_values:
      # 511x Major roads
      - { code: 5111, fclass: "motorway",    osm_tags: "highway=motorway" }
      - { code: 5112, fclass: "trunk",       osm_tags: "highway=trunk" }
      - { code: 5113, fclass: "primary",     osm_tags: "highway=primary" }
      - { code: 5114, fclass: "secondary",   osm_tags: "highway=secondary" }
      - { code: 5115, fclass: "tertiary",    osm_tags: "highway=tertiary" }
      # 512x Minor roads
      - { code: 5121, fclass: "unclassified", osm_tags: "highway=unclassified" }
      - { code: 5122, fclass: "residential",  osm_tags: "highway=residential" }
      - { code: 5123, fclass: "living_street", osm_tags: "highway=living_street" }
      - { code: 5124, fclass: "pedestrian",   osm_tags: "highway=pedestrian" }
      - { code: 5125, fclass: "busway",       osm_tags: "highway=busway" }
      # 513x Links
      - { code: 5131, fclass: "motorway_link", osm_tags: "highway=motorway_link" }
      - { code: 5132, fclass: "trunk_link",    osm_tags: "highway=trunk_link" }
      - { code: 5133, fclass: "primary_link",  osm_tags: "highway=primary_link" }
      - { code: 5134, fclass: "secondary_link", osm_tags: "highway=secondary_link" }
      - { code: 5135, fclass: "tertiary_link",  osm_tags: "highway=tertiary_link" }
      # 514x Very small roads
      - { code: 5141, fclass: "service",       osm_tags: "highway=service" }
      - { code: 5142, fclass: "track",          osm_tags: "highway=track (no tracktype)" }
      - { code: 5143, fclass: "track_grade1",   osm_tags: "highway=track + tracktype=grade1" }
      - { code: 5144, fclass: "track_grade2",   osm_tags: "highway=track + tracktype=grade2" }
      - { code: 5145, fclass: "track_grade3",   osm_tags: "highway=track + tracktype=grade3" }
      - { code: 5146, fclass: "track_grade4",   osm_tags: "highway=track + tracktype=grade4" }
      - { code: 5147, fclass: "track_grade5",   osm_tags: "highway=track + tracktype=grade5" }
      # 515x Paths
      - { code: 5151, fclass: "bridleway",      osm_tags: "highway=bridleway OR highway=path + horse=designated" }
      - { code: 5152, fclass: "cycleway",       osm_tags: "highway=cycleway OR highway=path + cycle=designated" }
      - { code: 5153, fclass: "footway",        osm_tags: "highway=footway OR highway=path + foot=designated" }
      - { code: 5154, fclass: "path",           osm_tags: "highway=path (general)" }
      - { code: 5155, fclass: "steps",          osm_tags: "highway=steps" }
      - { code: 5199, fclass: "unknown",        osm_tags: "highway=road" }

  - name: railways
    geometry: linestring
    code_prefix: "61xx"
    description: "Railways, subways, trams, lifts, and cable cars"
    additional_fields:
      - { name: "layer",  type: "SMALLINT",   osm_tags: "layer=*",  description: "Relative layering (-5 to 5)" }
      - { name: "bridge", type: "VARCHAR(1)", osm_tags: "bridge=*", description: "'T' = on bridge" }
      - { name: "tunnel", type: "VARCHAR(1)", osm_tags: "tunnel=*", description: "'T' = in tunnel" }
    fclass_values:
      - { code: 6101, fclass: "rail",        osm_tags: "railway=rail (unless traction=* set)" }
      - { code: 6102, fclass: "light_rail",  osm_tags: "railway=light_rail" }
      - { code: 6103, fclass: "subway",      osm_tags: "railway=subway" }
      - { code: 6104, fclass: "tram",        osm_tags: "railway=tram" }
      - { code: 6105, fclass: "monorail",    osm_tags: "railway=monorail" }
      - { code: 6106, fclass: "narrow_gauge", osm_tags: "railway=narrow_gauge" }
      - { code: 6107, fclass: "miniature",   osm_tags: "railway=miniature" }
      - { code: 6108, fclass: "funicular",   osm_tags: "railway=funicular OR railway=rail + traction=funicular" }
      - { code: 6109, fclass: "rack",        osm_tags: "railway=rack OR railway=rail + traction=rack OR railway=rail + rack=yes" }
      - { code: 6111, fclass: "drag_lift",   osm_tags: "aerialway=drag_lift" }
      - { code: 6112, fclass: "chair_lift",  osm_tags: "aerialway=chair_lift OR aerialway=high_speed_chair_lift" }
      - { code: 6113, fclass: "cable_car",   osm_tags: "aerialway=cable_car" }
      - { code: 6114, fclass: "gondola",     osm_tags: "aerialway=gondola" }
      - { code: 6115, fclass: "goods",       osm_tags: "aerialway=goods" }
      - { code: 6119, fclass: "other_lift",  osm_tags: "aerialway=platter/t-bar/j-bar/magic_carpet/zip_line/rope_tow/mixed_lift" }

  - name: waterways
    geometry: linestring
    code_prefix: "81xx"
    description: "Rivers, canals, streams, and drains"
    additional_fields:
      - { name: "width", type: "SMALLINT", osm_tags: "width=*", description: "Width in metres" }
    fclass_values:
      - { code: 8101, fclass: "river",  osm_tags: "waterway=river",  description: "Large river" }
      - { code: 8102, fclass: "stream", osm_tags: "waterway=stream", description: "Smaller river or stream" }
      - { code: 8103, fclass: "canal",  osm_tags: "waterway=canal",  description: "Artificial waterway" }
      - { code: 8104, fclass: "drain",  osm_tags: "waterway=drain",  description: "Small drainage ditch" }

  # ============================================================
  # POLYGON FEATURES
  # ============================================================

  - name: adminareas
    geometry: polygon
    code_prefix: "12xx"
    description: "Administrative boundaries (built from boundary lines)"
    additional_fields: []
    fclass_values:
      - { code: 1200, fclass: "admin_area",     osm_tags: "boundary=administrative (general)" }
      - { code: 1201, fclass: "admin_level1",   osm_tags: "boundary=administrative + admin_level=1" }
      - { code: 1202, fclass: "national",       osm_tags: "boundary=administrative + admin_level=2 (national border)" }
      - { code: 1203, fclass: "admin_level3",   osm_tags: "boundary=administrative + admin_level=3" }
      - { code: 1204, fclass: "admin_level4",   osm_tags: "boundary=administrative + admin_level=4 (NUTS-2: state/region)" }
      - { code: 1205, fclass: "admin_level5",   osm_tags: "boundary=administrative + admin_level=5" }
      - { code: 1206, fclass: "admin_level6",   osm_tags: "boundary=administrative + admin_level=6 (NUTS-3: county)" }
      - { code: 1207, fclass: "admin_level7",   osm_tags: "boundary=administrative + admin_level=7" }
      - { code: 1208, fclass: "admin_level8",   osm_tags: "boundary=administrative + admin_level=8 (city/borough)" }
      - { code: 1209, fclass: "admin_level9",   osm_tags: "boundary=administrative + admin_level=9" }
      - { code: 1210, fclass: "admin_level10",  osm_tags: "boundary=administrative + admin_level=10" }
      - { code: 1211, fclass: "admin_level11",  osm_tags: "boundary=administrative + admin_level=11" }

  - name: buildings
    geometry: polygon
    code_prefix: "15xx"
    description: "Building outlines"
    additional_fields:
      - { name: "type", type: "VARCHAR(20)", osm_tags: "building=*", description: "Building type (empty if building=yes)" }
    fclass_values:
      - { code: 1500, fclass: "buildings", osm_tags: "building=*", description: "Building outlines" }

  - name: landuse
    geometry: polygon
    code_prefix: "72xx"
    description: "Land use and land cover — forests, residential, industrial, farmland, parks, etc."
    additional_fields: []
    fclass_values:
      - { code: 7201, fclass: "forest",            osm_tags: "landuse=forest OR natural=wood" }
      - { code: 7202, fclass: "park",              osm_tags: "leisure=park OR leisure=common" }
      - { code: 7203, fclass: "residential",       osm_tags: "landuse=residential" }
      - { code: 7204, fclass: "industrial",        osm_tags: "landuse=industrial" }
      - { code: 7206, fclass: "cemetery",          osm_tags: "landuse=cemetery" }
      - { code: 7207, fclass: "allotments",        osm_tags: "landuse=allotments" }
      - { code: 7208, fclass: "meadow",            osm_tags: "landuse=meadow" }
      - { code: 7209, fclass: "commercial",        osm_tags: "landuse=commercial" }
      - { code: 7211, fclass: "recreation_ground", osm_tags: "leisure=recreation_ground OR landuse=recreation_ground" }
      - { code: 7212, fclass: "retail",            osm_tags: "landuse=retail" }
      - { code: 7213, fclass: "military",          osm_tags: "landuse=military" }
      - { code: 7214, fclass: "quarry",            osm_tags: "landuse=quarry" }
      - { code: 7215, fclass: "orchard",           osm_tags: "landuse=orchard" }
      - { code: 7216, fclass: "vineyard",          osm_tags: "landuse=vineyard" }
      - { code: 7217, fclass: "scrub",             osm_tags: "landuse=scrub" }  # Note: natural=scrub is possible too
      - { code: 7218, fclass: "grass",             osm_tags: "landuse=grass" }
      - { code: 7219, fclass: "heath",             osm_tags: "natural=heath" }
      - { code: 7228, fclass: "farmland",          osm_tags: "landuse=farmland" }
      - { code: 7229, fclass: "farmyard",          osm_tags: "landuse=farmyard" }
      - { code: 7233, fclass: "landfill",          osm_tags: "landuse=landfill" }

  - name: protected_areas
    geometry: polygon
    code_prefix: "73xx"
    description: "Nature reserves, national parks, and IUCN protected areas"
    additional_fields:
      - { name: "icun",  type: "VARCHAR(10)",  osm_tags: "protect_class=*",         description: "IUCN category (may contain multiple values)" }
      - { name: "title", type: "VARCHAR(100)", osm_tags: "protection_title=*",       description: "Official national predicate or grade" }
    fclass_values:
      - { code: 7300, fclass: "other_nature_reserve", osm_tags: "leisure=nature_reserve (fallback, no IUCN assigned)", description: "Nature reserve without detailed protection specification" }
      - { code: 7301, fclass: "icun_1",               osm_tags: "boundary=protected_area + protect_class=1/1a/1b", description: "Strict Nature Reserve (IUCN 1a) or Wilderness Area (IUCN 1b)" }
      - { code: 7302, fclass: "national_park",        osm_tags: "boundary=national_park OR boundary=protected_area + protect_class=2", description: "National Park (IUCN 2)" }
      - { code: 7303, fclass: "icun_3",               osm_tags: "boundary=protected_area + protect_class=3", description: "Natural Monument or Feature (IUCN 3)" }
      - { code: 7304, fclass: "icun_4",               osm_tags: "boundary=protected_area + protect_class=4", description: "Habitat/Species Management Area (IUCN 4)" }
      - { code: 7305, fclass: "icun_5",               osm_tags: "boundary=protected_area + protect_class=5", description: "Protected Landscape/Seascape (IUCN 5)" }
      - { code: 7306, fclass: "icun_6",               osm_tags: "boundary=protected_area + protect_class=6", description: "Sustainable use of natural resources (IUCN 6)" }
      - { code: 7307, fclass: "icun_7",               osm_tags: "boundary=protected_area + protect_class=7", description: "Smaller protected natural features (IUCN 7)" }
      - { code: 7308, fclass: "icun_8",               osm_tags: "boundary=protected_area + protect_class=97/98 OR ramsar=yes", description: "International treaties (Natura 2000, Ramsar, etc.)" }

  - name: water
    geometry: polygon
    code_prefix: "82xx"
    description: "Bodies of water — lakes, reservoirs, rivers, glaciers, wetlands"
    additional_fields: []
    fclass_values:
      - { code: 8200, fclass: "water",      osm_tags: "natural=water (water!=river/reservoir)", description: "Unspecified water body" }
      - { code: 8201, fclass: "reservoir",  osm_tags: "landuse=reservoir OR natural=water + water=reservoir", description: "Artificial lake (reservoir)" }
      - { code: 8202, fclass: "river",      osm_tags: "waterway=riverbank OR natural=water + water=river", description: "Larger river (polygon)" }
      - { code: 8203, fclass: "dock",       osm_tags: "waterway=dock", description: "Dock (ship repair)" }
      - { code: 8211, fclass: "glacier",    osm_tags: "natural=glacier", description: "Glacier" }
      - { code: 8221, fclass: "wetland",    osm_tags: "natural=wetland", description: "Wetland" }

# ============================================================
# ZOOM TO SCALE CONVERSION (for SLD)
# ============================================================
# OGC standard assumes 0.28mm pixel size (90 DPI)
# ScaleDenominator = (pixel_size_meters * zoom_scale) / 0.00028
# z17 ≈ 1:2000 ground scale → ScaleDenominator ≈ 1.19
zoom_scale_mapping:
  z17:
    scale_denominator: 1.19
    ground_scale: "1:2000"
    description: "Building-level detail, individual buildings, POI icons, road names"

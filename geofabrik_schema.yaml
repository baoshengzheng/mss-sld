# Geofabrik OSM Free Shapefiles Schema
# Source: https://download.geofabrik.de/osm-data-in-gis-formats-free.pdf
# Version: free shapes based on commercial 0.8 format (2026-04-02)
#
# Coordinate System: WGS84 (EPSG:4326), unprojected
# Character Encoding: UTF-8
#
# Common fields across all layers:
#   osm_id  - OSM ID (BIGINT / VARCHAR(12) in shapefile)
#   code    - SMALLINT, 4-digit feature class code (first 1-2 digits = layer, last 2-3 = class)
#   fclass  - VARCHAR(40), class name (human-readable)
#   name    - VARCHAR(100), name from OSM name tag
#
# Layer naming convention:
#   Point features mapped from OSM nodes → layer name without suffix
#   Area features mapped from OSM ways/relations → layer name with _a suffix
#   In shapefiles: osm_<layer>_free_1.shp (spillover _2, _3 etc if >2GB)

layers:
  # ============================================================
  # POINT FEATURES
  # ============================================================

  - name: places
    geometry: point
    code_prefix: "10xx"
    description: "Cities, towns, suburbs, villages, and other named places"
    additional_fields:
      - name: population
        type: INTEGER
        description: "Number of people living in this place (0 if unknown or for islands)"
        osm_tags: "population=*"
    fclass_values:
      - { code: 1000, fclass: "city",             osm_tags: "place=city (but see 1005)", description: "National/state/provincial capital, often >100,000 people" }
      - { code: 1001, fclass: "city",             osm_tags: "place=city", description: "City as defined by national government" }
      - { code: 1002, fclass: "town",             osm_tags: "place=town", description: "Town, generally 10,000-100,000 people" }
      - { code: 1003, fclass: "village",          osm_tags: "place=village", description: "Village, generally <10,000 people" }
      - { code: 1004, fclass: "hamlet",           osm_tags: "place=hamlet", description: "Hamlet, just a few houses" }
      - { code: 1005, fclass: "national_capital", osm_tags: "place=city + is_capital=country OR admin_level=2 OR capital=yes", description: "National capital" }
      - { code: 1010, fclass: "suburb",           osm_tags: "place=suburb", description: "Named area of town or city" }
      - { code: 1020, fclass: "island",           osm_tags: "place=island", description: "Island" }
      - { code: 1030, fclass: "farm",             osm_tags: "place=farm", description: "Named farm" }
      - { code: 1031, fclass: "dwelling",         osm_tags: "place=isolated_dwelling", description: "Isolated dwelling (1-2 houses)" }
      - { code: 1040, fclass: "region",           osm_tags: "place=region", description: "Region label" }
      - { code: 1041, fclass: "county",           osm_tags: "place=county", description: "County label" }
      - { code: 1050, fclass: "locality",         osm_tags: "place=locality", description: "Other named place" }

  - name: pois
    geometry: point
    code_prefix: "2xxx"
    description: "Points of Interest — public facilities, health, leisure, catering, accommodation, shopping, money, tourism, misc"
    additional_fields: []
    fclass_values:
      # 20xx public
      - { code: 2001, fclass: "police",              group: "public",       osm_tags: "amenity=police" }
      - { code: 2002, fclass: "fire_station",        group: "public",       osm_tags: "amenity=fire_station" }
      - { code: 2004, fclass: "post_box",            group: "public",       osm_tags: "amenity=post_box" }
      - { code: 2005, fclass: "post_office",         group: "public",       osm_tags: "amenity=post_office" }
      - { code: 2006, fclass: "telephone",           group: "public",       osm_tags: "amenity=telephone" }
      - { code: 2007, fclass: "library",             group: "public",       osm_tags: "amenity=library" }
      - { code: 2008, fclass: "town_hall",           group: "public",       osm_tags: "amenity=townhall" }
      - { code: 2009, fclass: "courthouse",          group: "public",       osm_tags: "amenity=courthouse" }
      - { code: 2010, fclass: "prison",              group: "public",       osm_tags: "amenity=prison" }
      - { code: 2011, fclass: "embassy",             group: "public",       osm_tags: "amenity=embassy OR office=diplomatic + diplomatic=embassy" }
      - { code: 2012, fclass: "community_centre",    group: "public",       osm_tags: "amenity=community_centre" }
      - { code: 2013, fclass: "nursing_home",        group: "public",       osm_tags: "amenity=nursing_home" }
      - { code: 2014, fclass: "arts_centre",         group: "public",       osm_tags: "amenity=arts_centre" }
      - { code: 2015, fclass: "graveyard",           group: "public",       osm_tags: "amenity=grave_yard OR landuse=cemetery" }
      - { code: 2016, fclass: "market_place",        group: "public",       osm_tags: "amenity=marketplace" }
      - { code: 2017, fclass: "consulate",           group: "public",       osm_tags: "office=diplomatic + diplomatic=consulate" }
      # 203x recycling
      - { code: 2030, fclass: "recycling",           group: "public",       osm_tags: "amenity=recycling (general)" }
      - { code: 2031, fclass: "recycling_glass",     group: "public",       osm_tags: "recycling:glass=yes OR recycling:glass_bottles=yes" }
      - { code: 2032, fclass: "recycling_paper",     group: "public",       osm_tags: "recycling:paper=yes" }
